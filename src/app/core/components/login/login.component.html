<div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-8">
    <h2 class="text-2xl font-semibold text-slate-900 mb-6">Iniciar sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit(loginForm.value)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500"
          [ngClass]="{ 'border-red-500': submitted && email?.errors }"
        />
        <div class="mt-2 text-sm text-red-600" *ngIf="submitted && email?.errors">
          <span *ngIf="email?.errors?.['required']">Email es obligatorio.</span>
          <span *ngIf="email?.errors?.['email']">Email invalido.</span>
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">Contraseña</label>
        <div class="flex gap-2">
          <input
            [type]="hide ? 'password' : 'text'"
            formControlName="password"
            class="flex-1 rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-sky-500"
            [ngClass]="{ 'border-red-500': submitted && password?.errors }"
          />
          <button type="button" class="px-4 py-3 rounded-xl bg-slate-100 text-slate-700" (click)="hide = !hide">
            {{ hide ? 'Mostrar' : 'Ocultar' }}
          </button>
        </div>
        <div class="mt-2 text-sm text-red-600" *ngIf="submitted && password?.errors">
          <span *ngIf="password?.errors?.['required']">Contraseña es obligatoria.</span>
        </div>
      </div>

      <div class="mb-4 text-sm text-red-600" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full rounded-2xl bg-sky-600 px-4 py-3 text-white font-semibold hover:bg-sky-700 disabled:opacity-50"
      >
        Entrar
      </button>
    </form>

    <div class="mt-6 text-sm text-slate-600 text-center">
      <span>¿No tienes cuenta?</span>
      <a routerLink="/registration" class="font-semibold text-sky-600 hover:text-sky-700"> Regístrate</a>
    </div>
  </div>
</div>
