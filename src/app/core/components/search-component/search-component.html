<form (ngSubmit)="searchItem()" class="flex items-center w-full">
  <div class="relative w-full">
    <input 
      type="text" 
      name="searchText"
      [(ngModel)]="searchParameter.text"
      (input)="searchParameter.text = $any($event.target).value"
      placeholder="Buscar productos..." 
      class="w-full bg-gray-700 text-sky-50 pl-4 pr-10 py-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500 text-2xl font-bold"
    />
    
    <button 
      type="submit" 
      class="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-gray-400 hover:text-sky-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
      </svg>
    </button>
  </div>
</form>
