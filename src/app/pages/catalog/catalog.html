<div class="w-full max-w-[var(--container)] mx-auto px-4 py-8">
  
  <div>
    
    @for (product of products; track product.id) {
      <div class="transition-transform duration-200 hover:scale-[1.02]">
        <app-catalog-component [product]="product"></app-catalog-component>
      </div>
    } @empty {
      
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 text-gray-400 mb-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0 0 12.016 15a4.486 4.486 0 0 0-3.198 1.318M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
        </svg>
        <h3 class="text-xl font-bold text-gray-700">No se encontraron productos</h3>
        <p class="text-gray-500 mt-1">Intenta buscar con otros términos o limpia el filtro.</p>
      </div>

    }

  </div>
</div>
